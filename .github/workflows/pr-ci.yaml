  build-with-latest-wildfly:
    name: Build and test with latest WildFly
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wildfly-vault-feature-pack
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Checkout WildFly
        uses: actions/checkout@v4
        with:
          repository: wildfly/wildfly
          ref: main
          path: wildfly

      - name: Cache WildFly build
        uses: actions/cache@v4
        id: wildfly-cache
        with:
          path: |
            wildfly/build/target
            wildfly/dist/target
            ~/.m2/repository/org/wildfly
            ~/.m2/repository/org/jboss
          key: wildfly-${{ hashFiles('wildfly/pom.xml') }}

      - name: Build WildFly
        if: steps.wildfly-cache.outputs.cache-hit != 'true'
        run: |
          cd wildfly
          mvn -B install -DskipTests

      - name: Get WildFly version
        id: wildfly-version
        run: |
          VERSION=$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout -f wildfly/pom.xml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using WildFly version: $VERSION"

      - name: Build and test wildfly-vault-feature-pack with latest WildFly
        run: |
          mvn -B install -Dversion.org.wildfly=${{ steps.wildfly-version.outputs.version }}
